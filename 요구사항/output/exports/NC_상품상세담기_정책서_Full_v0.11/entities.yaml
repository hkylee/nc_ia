    processing_flow: |
      (상태) 상품 상세 진입 → (액션) 후기·Q&A 운영 관리에 필요한 상품군·판매상태·핵심 속성을 원장 기준으로 조립 → (결과) 고객이 상품 목적과 가입 가능성을 먼저 이해할 수 있는 요약 영역 구성
