    description: "담기 성공·실패, 실패 유형, 상품·옵션, 고객군, 상담 전환 추이를 모니터링한다."
    details: |
      실시간 현황
      실패율
      전환율
      고객군 분석
    input_info: |
      고객 가입 상태, 회선/요금제/권한/인증 상태
      선택 옵션, 필수 구성, 동시 주문 가능 상품, 재고·배송 조건
      담기 가능 여부와 장바구니·주문 전환 대상 정보
      상품 관계, 중복 가입, 판매 상태, 제한 사유 정책
    output_info: |
      담기 가능 여부와 선택 구성 상태
      수정 필요 옵션과 제한 사유
      장바구니·주문·계속 탐색 전환값
      상품 조합·재고·조건 판정 이력
    processing_flow: |
      (상태) 상품 구성 선택 → (액션) 담기 활동 모니터링 기준으로 옵션, 재고, 가입 조건, 상품 관계를 동시 검증 → (결과) 담기 가능, 보완 필요, 선택 불가 중 하나로 판정
      (상태) 고객 조건 또는 선택값 변경 → (액션) 기존 선택 구성과 충돌 여부, 필수 구성 누락, 동시 주문 제한을 재확인 → (결과) 수정해야 할 항목과 유지 가능한 항목 분리
      (상태) 담기 또는 다음 행동 요청 → (액션) 유효한 선택 구성만 상태 저장하고 장바구니·주문·계속 탐색 경로를 결정 → (결과) 고객 선택 맥락이 끊기지 않고 후속 업무로 전달
    failure_cases: |
      재고, 판매 상태, 가입 조건 중 하나라도 미확정이면 담기를 확정하지 않고 보완 가능한 항목을 안내한다.
      선택 조합이 충돌하면 전체 초기화가 아니라 충돌 항목만 수정하도록 한다.
      로그인·인증 후 복귀 시 기존 선택 구성이 사라지면 재선택 없이 복원 가능한 상태로 전환한다.
