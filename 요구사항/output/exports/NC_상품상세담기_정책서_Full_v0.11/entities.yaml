functions:
  - id: "FN-PDD-DTL-001"
    name: "상품 요약·핵심 속성 표시"
    english_name: "TBD"
    aliases: []
    actor_ids: ["ACT-PDD-001"]
    process_ids: ["PR-PDD-DTL-001"]
    related_policy_group_ids: ["PG-PDD-SUMMARY-001", "PG-PDD-TPL-001"]
    description: "상품정보 및 가격 확인에 필요한 상품명, 이미지, 유형, 가격, 할인유형, 가입 가능 요약을 고객 맥락에 맞게 표시한다."
    details: |
      요약 카드
      핵심 속성
      상태별 강조
      원장 이동
      상품정보 확인
    input_info: |
      상품 ID, 상품군, 판매 상태, 대표 가격·혜택 정보
      고객 진입 경로와 조회 세션 정보
      상품 상세 템플릿의 필수 섹션과 노출 우선순위
      고객에게 숨겨야 할 내부 코드·운영 문구 제외 기준
    output_info: |
      고객용 상품 요약과 상세 섹션 노출 결과
      상품군별 필수 정보 표시 여부
      미노출·대체 안내 사유
      상품 상세 조회와 비교·담기 전환 이력
    processing_flow: |
      (상태) 상품 상세 진입 → (액션) 상품 요약·핵심 속성 표시에 필요한 상품군·판매상태·핵심 속성을 원장 기준으로 조립 → (결과) 고객이 상품 목적과 가입 가능성을 먼저 이해할 수 있는 요약 영역 구성
      (상태) 추가 설명 확인 → (액션) 미디어, 스펙, 후기, Q&A, 유의사항을 고객 의사결정 순서로 재배치 → (결과) 상품 이해에 필요한 정보와 내부 운영 문구를 분리 표시
      (상태) 정보 부족 또는 노출 제한 발생 → (액션) 대체 설명, 상담 연결, 미노출 사유를 정책 기준으로 선택 → (결과) 빈 화면 없이 다음 탐색 또는 문의 경로 제공
    failure_cases: |
      상품 기준 정보가 누락되면 해당 섹션을 숨기지 않고 보완 필요 또는 상담 가능 경로를 안내한다.
      내부 운영 코드나 원장 필드명이 고객 문구로 노출되면 배포를 제한한다.
      미디어·후기·스펙 로딩 실패 시 핵심 요약과 가격·조건 판단은 유지한다.
