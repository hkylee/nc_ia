terms:
  - id: "TM-PDD-001"
    name: "상품 상세 원장"
    english_name: "TBD"
    aliases: []
    type: "concept"
    sample_values: []
    definition: "상품명, 이미지, 가격, 혜택, 가입 조건, 상품군별 스펙, 고시 정보처럼 상세 화면을 구성하는 기준 데이터다. 채널 노출 정보와 Product Catalog 기준 정보가 함께 사용된다."
  - id: "TM-PDD-002"
    name: "상품군 표준 템플릿"
    english_name: "TBD"
    aliases: []
    type: "concept"
    sample_values: []
    definition: "휴대폰, 요금제, 부가서비스, 로밍, 구독, 보험 등 상품군별로 필수 섹션, 비교 속성, 안내 문구, 선택 항목을 정의한 표시 기준이다."
  - id: "TM-PDD-003"
    name: "담기"
    english_name: "TBD"
    aliases: []
    type: "concept"
    sample_values: []
    definition: "고객이 상품 상세에서 선택한 상품, 옵션, 프로그램, 혜택 구성을 주문 또는 장바구니로 이어가기 위해 임시 확정하는 행위다."
  - id: "TM-PDD-004"
    name: "담기 가능 여부"
    english_name: "TBD"
    aliases: []
    type: "concept"
    sample_values: []
    definition: "판매 상태, 고객 자격, 중복 보유, 선행 조건, 재고, 판매 기간, 채널 판매 가능 여부를 종합해 담기 실행을 허용할지 판단한 결과다."
  - id: "TM-PDD-005"
    name: "상품 조합 정책"
    english_name: "TBD"
    aliases: []
    type: "concept"
    sample_values: []
    definition: "단말, 요금제, 부가서비스, 구독, 혜택, 마케팅 프로그램이 동시에 선택 가능한지와 필수·선택 구성의 관계를 정의한 기준이다."
  - id: "TM-PDD-006"
    name: "AI atomic view"
    english_name: "TBD"
    aliases: []
    type: "concept"
    sample_values: []
    definition: "상품 상세 원장 정보를 고객 세그먼트, 가입 상태, 이용 맥락에 따라 요약·재배열해 작은 설명 단위로 제공하는 개인화 뷰다."
  - id: "TM-PDD-007"
    name: "비교 컴포넌트"
    english_name: "TBD"
    aliases: []
    type: "concept"
    sample_values: []
    definition: "2개 이상 상품을 상품군별 표준 속성, 고객 현재 조건, 예상 비용, 혜택 기준으로 비교해 선택 판단을 돕는 구성 요소다."
  - id: "TM-PDD-008"
    name: "원위치 복귀"
    english_name: "TBD"
    aliases: []
    type: "concept"
    sample_values: []
    definition: "로그인, 본인확인, 회선 확인, 상담 전환 뒤 고객이 기존 상품 상세와 선택 상태로 돌아와 업무를 이어가는 기준이다."
  - id: "TM-PDD-009"
    name: "불편 이벤트"
    english_name: "TBD"
    aliases: []
    type: "concept"
    sample_values: []
    definition: "담기 과정에서 발생하는 정책 충돌, 인증 실패, 재고 불일치, 연계 실패, 반복 실패, 상담 전환 급증처럼 운영자가 감지해야 하는 고객 불편 신호다."
  - id: "TM-PDD-010"
    name: "Product Offering 관계"
    english_name: "TBD"
    aliases: []
    type: "concept"
    sample_values: []
    definition: "상품과 마케팅 프로그램 사이의 동시 가입, 자동 가입, 자동 해지, 선가입·선해지, 단독 구매 관계를 판단하는 기준이다."
  - id: "TM-PDD-011"
    name: "Product Catalog"
    english_name: "TBD"
    aliases: []
    type: "concept"
    sample_values: []
    definition: "NOVA에서 상품, 마케팅, 서비스, 혜택, 정책, 가입조건, 가격, 상품 관계를 통합 정의하고 채널이 수신하는 기준 원장이다."
  - id: "TM-PDD-012"
    name: "상품 라이프사이클"
    english_name: "TBD"
    aliases: []
    type: "concept"
    sample_values: []
    definition: "상품기획, 검토, 개발, 검증, 출시, 운영, 가입중단, 퇴출처럼 채널 노출과 담기 가능성을 결정하는 상품 상태 흐름이다."
  - id: "TM-PDD-013"
    name: "운영 검증 기준"
    english_name: "TBD"
    aliases: []
    type: "concept"
    sample_values: []
    definition: "운영자가 상품 상세, 카테고리, 키워드, 후기, 디바이스, 외부채널 설정을 등록·수정·삭제하기 전에 필수값, 참조 데이터, 영향도를 확인하는 기준이다."
  - id: "TM-PDD-014"
    name: "외부채널 상품 설정"
    english_name: "TBD"
    aliases: []
    type: "concept"
    sample_values: []
    definition: "외부 제휴처에 판매할 모상품, 요금제, 부가서비스, 모바일 카테고리, 모상품그룹을 채널 정책과 동일한 기준으로 설정하는 운영 기준이다."

