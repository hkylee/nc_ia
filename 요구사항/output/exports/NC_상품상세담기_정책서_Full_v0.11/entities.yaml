    english_name: "TBD"
    aliases: []
    actor_ids: ["ACT-PDD-001", "ACT-PDD-003"]
    process_ids: ["PR-PDD-ERR-001", "PR-PDD-CS-002"]
    related_policy_group_ids: ["PG-PDD-FAIL-001", "PG-PDD-COMBO-001", "PG-PDD-CS-001"]
    description: "선택 불가, 조합 충돌, 가입 불가, 재고 부족 사유와 수정 방법을 안내한다."
    details: |
      불가 사유
      수정 방법
      대체 상품
      나중에 보기
    input_info: |
      고객이 선택한 상품·옵션·혜택 구성 정보
      실패 사유, 인증 필요 사유, 충돌 상품, 재고·조건 불일치 정보
      원위치 복귀 토큰, 상담 전환 문맥, 이전 시도 이력
      대체 상품 또는 수정 가능한 입력 항목 후보
    output_info: |
      실패 사유와 고객 안내 문구
      복구 가능 경로와 원위치 복귀 정보
      상담 전환 시 전달 문맥
      반복 실패·인증·충돌 이력
    processing_flow: |
      (상태) 담기 실패 또는 인증 필요 발생 → (액션) 선택 불가·충돌 복구 안내 기준으로 실패 사유를 조건 불일치, 인증 필요, 재고 부족, 시스템 지연으로 분류 → (결과) 고객에게 수정 가능 여부와 다음 행동 제시
      (상태) 고객이 복구 경로 선택 → (액션) 원위치 복귀 토큰과 이전 선택 구성을 유지하고 필요한 입력만 다시 요청 → (결과) 중복 입력을 줄이고 담기 재시도 가능 상태 복원
      (상태) 반복 실패 또는 상담 필요 → (액션) 상품, 옵션, 실패 사유, 시도 이력을 상담 문맥으로 전달 → (결과) 상담사가 동일 설명을 반복 요청하지 않고 대체 경로 안내
    failure_cases: |
      동일 실패가 반복되면 재시도만 제공하지 않고 대체 상품, 상담, 나중에 다시 시도 경로를 제시한다.
      상담 전환 시 상품 ID, 옵션, 오류 사유가 누락되면 상담 접수 전 보완한다.
      인증 실패 후 원위치 복귀가 불가능하면 고객에게 다시 선택해야 하는 항목을 명확히 안내한다.
