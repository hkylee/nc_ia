    document.getElementById("viewer-shell").classList.add("is-failed");
    if (error) {
      console.warn("BPMN render failed.", error);
    }
  }
  function render() {
    var xml = readBpmnXml();
    if (!xml || !window.BpmnJS) {
      markFailed();
      return;
    }
    try {
      var viewer = new window.BpmnJS({ container: "#canvas" });
      viewer.importXML(xml).then(function () {
        viewer.get("canvas").zoom("fit-viewport");
      }).catch(markFailed);
    } catch (error) {
      markFailed(error);
    }
  }
  function bindDownload() {
    var button = document.querySelector("[data-bpmn-download]");
    if (!button) {
      return;
    }
    button.addEventListener("click", function () {
      var xml = readBpmnXml();
      if (!xml) {
        return;
      }
      var blob = new Blob([xml], { type: "application/xml;charset=utf-8" });
      var url = URL.createObjectURL(blob);
      var anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = "NC_할인시뮬레이션_정책서_간소화_v0.11_전체업무흐름도.bpmn";
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      window.setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    });
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", function () {
      render();
      bindDownload();
    });
  } else {
    render();
    bindDownload();
  }
})();
</script>
</body>
</html>
